<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title data-i18n="appName">Shopee Same-Store Finder</title>
  <style>
    html, body { width: 380px; height: 600px; }
    html { overflow: hidden; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Arial;
      margin: 0;
      padding: 12px;
      box-sizing: border-box;
      overflow: auto;
    }
    button { width: 100%; padding: 14px; margin: 8px 0; cursor: pointer; }
    input { width: 100%; padding: 8px; box-sizing: border-box; }
    .muted { color: #666; font-size: 12px; line-height: 1.4; }
    .section { margin: 12px 0; }
    .progress { background: #f6f6f6; padding: 10px; border-radius: 8px; }
    .progress-item { display: flex; justify-content: space-between; padding: 4px 0; }
    .ok { color: #1b7f3a; }
    .warn { color: #b36b00; }
    .result { background: #f6f6f6; padding: 10px; border-radius: 8px; }
    .result-list { max-height: 180px; overflow: auto; padding-left: 16px; margin: 8px 0 0; }
    .result-list li { margin: 4px 0; }
    a { color: #0b57d0; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .range-row { display: flex; align-items: center; gap: 8px; }
    .range-row input[type="range"] { flex: 1; accent-color: #ee4d2d; }
    .range-value { min-width: 28px; text-align: right; font-weight: 600; }
    .range-row input[type="range"]::-webkit-slider-thumb {
      width: 40px; height: 40px; border-radius: 50%;
      background: #fff; border: 2px solid #ee4d2d;
    }
    .range-row input[type="range"]::-moz-range-thumb {
      width: 40px; height: 40px; border-radius: 50%;
      background: #fff; border: 2px solid #ee4d2d;
    }
  </style>
</head>
<body>
  <h3 data-i18n="appName">Shopee Same-Store Finder</h3>

  <div class="section">
    <label class="muted" data-i18n="labelKeywords">Enter keywords (Space separated)</label>
    <input id="keywordsInput" data-i18n-placeholder="keywordsPlaceholder" placeholder="mask filter" />
    <div class="section">
      <label class="muted" data-i18n="labelStrength">Search Intensity</label>
      <div class="range-row">
        <input id="searchStrength" type="range" min="2" max="20" step="2" value="6" />
        <div id="searchStrengthValue" class="range-value">6</div>
      </div>
      <div class="muted" data-i18n="strengthNote">Higher intensity means more pages and longer time.</div>
      <div class="muted" data-i18n="strengthWarn">High intensity may trigger Shopee verification (Captcha/403).</div>
    </div>
    <button id="btnStart" data-i18n="btnStart">Start Analysis</button>
    <button id="btnClear" data-i18n="btnClear">Clear History</button>
    <div class="muted" data-i18n="runningNote">You can close this popup while running. Results will appear here.</div>
    <div id="status" class="muted"></div>
  </div>

  <div class="section">
    <h4 data-i18n="sectionProgress">Progress</h4>
    <div id="progress" class="progress" data-i18n="progressIdle">(Wait for start)</div>
  </div>

  <div class="section">
    <h4 data-i18n="sectionResults">Results</h4>
    <div class="result">
      <div id="resultCount" data-i18n="resultCountZero">Matches: 0</div>
      <a id="openAll" class="muted" href="#" data-i18n="openAll">Open All</a>
      <ol id="resultList" class="result-list"></ol>
    </div>
    <div id="timer" class="muted" data-i18n="timerZero">Time: 0s</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
